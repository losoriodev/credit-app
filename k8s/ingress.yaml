apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: credit-app-ingress
  namespace: credit-app
  annotations:
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # WebSocket support for Phoenix Channels/LiveView
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/upstream-hash-by: "$remote_addr"
spec:
  ingressClassName: nginx
  rules:
    - host: credit-app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: credit-app-web
                port:
                  number: 80
  tls:
    - hosts:
        - credit-app.example.com
      secretName: credit-app-tls
