apiVersion: batch/v1
kind: Job
metadata:
  name: credit-app-migrate
  namespace: credit-app
spec:
  template:
    spec:
      containers:
        - name: migrate
          image: credit-app:latest
          command: ["bin/credit_app", "eval", "CreditApp.Release.migrate()"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
      restartPolicy: OnFailure
  backoffLimit: 3
