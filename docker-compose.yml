version: "3.8"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: credit_app_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ecto://postgres:postgres@db/credit_app_dev
      SECRET_KEY_BASE: "xH8VzZS7g8K2QR3J5N6M4P9W1T0Y6A2B7C5D8E1F3G4H6I7J9K0L2M3N5O8P1Q"
      GUARDIAN_SECRET_KEY: "super_secret_guardian_key_for_dev_1234567890"
      PHX_SERVER: "true"
      PORT: "4000"
      PHX_HOST: "localhost"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
